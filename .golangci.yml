version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Default linters.
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Style & correctness.
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - copyloopvar
    - gocritic
    - gofmt
    - goimports
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  goimports:
    local-prefixes: github.com/lowplane/kerno

  govet:
    enable-all: true
    disable:
      - fieldalignment  # too noisy for now

  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: increment-decrement
      - name: var-naming
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: superfluous-else
      - name: unreachable-code

  exhaustive:
    default-signifies-exhaustive: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-files:
    - ".*_bpfel\\.go$"
    - ".*_bpfeb\\.go$"
    - "gen_stub\\.go$"
